name: TLS Appointment Checker

on:
  schedule:
    # Every 12 min, 6am–10pm UTC (= UK winter time). For BST (summer), change to '*/12 5-21 * * 1-5'
    - cron: '*/12 5-21 * * 1-5'
    # Every 15 min, 8am–6pm UTC on weekends. For BST (summer), change to '*/15 7-17 * * 0,6'
    - cron: '*/15 7-17 * * 0,6'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 8

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      TLS_EMAIL: ${{ secrets.TLS_EMAIL }}
      TLS_PASSWORD: ${{ secrets.TLS_PASSWORD }}
      TLS_ORDER_ID: ${{ secrets.TLS_ORDER_ID }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Install Playwright browsers
        run: python3 -m playwright install chromium

      - name: Run checker
        run: python3 checker.py
